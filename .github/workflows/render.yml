name: Render AKEE 30s Promo

on:
  workflow_dispatch:
    inputs:
      render_name:
        description: "Name for the render artifact"
        required: false
        default: "akee-30s-promo"
  push:
    branches:
      - main

jobs:
  render_segments:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: "mobile"
            project_root: "render/current/akee-30s"
            segment_number: "01"
            composition_file: "mobile/segment-01.html"
            resolution: "portrait"
            artifact_name: "akee-mobile-segment-01"
            output_file: "segment-01.mp4"
          - variant: "mobile"
            project_root: "render/current/akee-30s"
            segment_number: "02"
            composition_file: "mobile/segment-02.html"
            resolution: "portrait"
            artifact_name: "akee-mobile-segment-02"
            output_file: "segment-02.mp4"
          - variant: "mobile"
            project_root: "render/current/akee-30s"
            segment_number: "03"
            composition_file: "mobile/segment-03.html"
            resolution: "portrait"
            artifact_name: "akee-mobile-segment-03"
            output_file: "segment-03.mp4"
          - variant: "mobile"
            project_root: "render/current/akee-30s"
            segment_number: "04"
            composition_file: "mobile/segment-04.html"
            resolution: "portrait"
            artifact_name: "akee-mobile-segment-04"
            output_file: "segment-04.mp4"
          - variant: "mobile"
            project_root: "render/current/akee-30s"
            segment_number: "05"
            composition_file: "mobile/segment-05.html"
            resolution: "portrait"
            artifact_name: "akee-mobile-segment-05"
            output_file: "segment-05.mp4"
          - variant: "mobile"
            project_root: "render/current/akee-30s"
            segment_number: "06"
            composition_file: "mobile/segment-06.html"
            resolution: "portrait"
            artifact_name: "akee-mobile-segment-06"
            output_file: "segment-06.mp4"
          - variant: "web"
            project_root: "render/current/akee-30s"
            segment_number: "01"
            composition_file: "web/segment-01.html"
            resolution: "landscape"
            artifact_name: "akee-web-segment-01"
            output_file: "segment-01.mp4"
          - variant: "web"
            project_root: "render/current/akee-30s"
            segment_number: "02"
            composition_file: "web/segment-02.html"
            resolution: "landscape"
            artifact_name: "akee-web-segment-02"
            output_file: "segment-02.mp4"
          - variant: "web"
            project_root: "render/current/akee-30s"
            segment_number: "03"
            composition_file: "web/segment-03.html"
            resolution: "landscape"
            artifact_name: "akee-web-segment-03"
            output_file: "segment-03.mp4"
          - variant: "web"
            project_root: "render/current/akee-30s"
            segment_number: "04"
            composition_file: "web/segment-04.html"
            resolution: "landscape"
            artifact_name: "akee-web-segment-04"
            output_file: "segment-04.mp4"
          - variant: "web"
            project_root: "render/current/akee-30s"
            segment_number: "05"
            composition_file: "web/segment-05.html"
            resolution: "landscape"
            artifact_name: "akee-web-segment-05"
            output_file: "segment-05.mp4"
          - variant: "web"
            project_root: "render/current/akee-30s"
            segment_number: "06"
            composition_file: "web/segment-06.html"
            resolution: "landscape"
            artifact_name: "akee-web-segment-06"
            output_file: "segment-06.mp4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          elif [[ -f pnpm-lock.yaml ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [[ -f yarn.lock ]]; then
            corepack enable
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Install FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          command -v ffmpeg
          command -v ffprobe

      - name: Verify render target
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ matrix.project_root }}/index.html"
          test -f "${{ matrix.project_root }}/${{ matrix.composition_file }}"
          npx --yes hyperframes@0.6.79 --version

      - name: Render segment
        shell: bash
        run: |
          set -euo pipefail
          npx --yes hyperframes@0.6.79 render "${{ matrix.project_root }}" -c "${{ matrix.composition_file }}" --resolution "${{ matrix.resolution }}" --workers=1 --strict -o "${{ matrix.output_file }}"

      - name: Upload segment artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.output_file }}

  assemble:
    runs-on: ubuntu-latest
    needs: render_segments
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: mobile
            artifact_glob: akee-mobile-segment-*
            final_output: akee-mobile-30s.mp4
          - variant: web
            artifact_glob: akee-web-segment-*
            final_output: akee-web-30s.mp4
    steps:
      - name: Download segment artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.artifact_glob }}
          path: segments/${{ matrix.variant }}
          merge-multiple: true

      - name: Install FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Concatenate segments
        shell: bash
        run: |
          set -euo pipefail
          workdir="segments/${{ matrix.variant }}"
          mapfile -t files < <(find "$workdir" -maxdepth 1 -name 'segment-*.mp4' | sort)
          file_count="${#files[@]}"
          if [[ "$file_count" -ne 6 ]]; then
            echo "Expected 6 segment files in $workdir, found $file_count." >&2
            exit 1
          fi
          list_file="$workdir/concat.txt"
          : > "$list_file"
          for file in "${files[@]}"; do
            printf 'file %s\n' "$file" >> "$list_file"
          done
          ffmpeg -y -f concat -safe 0 -i "$list_file" -c copy "$workdir/${{ matrix.final_output }}"

      - name: Upload final output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.final_output }}
          if-no-files-found: error
          path: segments/${{ matrix.variant }}/${{ matrix.final_output }}
